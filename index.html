async function renderScriptSelector(){
  console.log("🔄 Memuat daftar...");
  const { data, error } = await db.from("dialogs").select("script_name, genre");
  
  if(error) { console.error("❌ Gagal ambil daftar:", error); return; }

  let list = data ? [...new Set(data.map(s=>s.script_name))] : [];
  
  list = list.filter(n => n && n !== "null" && n !== "" && n !== undefined);
  
  if(list.length === 0) {
    list = ["Script Baru"];
    await simpanAwal("Script Baru", ""); // Simpan genre kosong awal
  }

  list = [...new Set(list)];

  scriptSelector.innerHTML = "";
  list.forEach(n=>{ 
    const o = document.createElement("option");

    o.textContent = "🎬 " + n;

        currentGenre = found.genre || "";
        genreInput.value = currentGenre;
        updateGenreDisplay();
      }
    }
    scriptSelector.appendChild(o); 
  });

  newScriptName.value = currentScript;
  localStorage.setItem("currentScript", currentScript);
  localStorage.setItem("currentGenre", currentGenre);
  console.log("✅ Daftar siap:", list);
}

    genreDisplay.textContent = `📂 Genre: ${currentGenre}`;
  } else {
    genreDisplay.textContent = ""; // Kosongkan jika tidak ada isi
  }
}

// ✅ SIMPAN DATA AWAL
async function simpanAwal(nama, genre = ""){
  try {
    const { data:cek } = await db.from("dialogs").select("script_name").eq("script_name", nama).limit(1);
    if(cek.length === 0){
      await db.from("dialogs").insert([{
        script_name: nama,
        genre: genre,
        scene: "1",
        place: "",
        situation: "",
        weather: "☀️ Cerah",
        character: "",
        message: "",
        position: "left",
        avatar: "male"
      }]);
      console.log("✅ Data awal disimpan:", nama, "Genre:", genre);
    }
  } catch (err) {
    console.error("❌ Gagal simpan awal:", err);
  }
}

// ✅ GANTI NAMA SCRIPT
newScriptName.addEventListener("change", async ()=>{
  const lama = currentScript; 
  const baru = newScriptName.value.trim();
  
  if(!baru || baru === lama) return;
  
  console.log("✏️ Ganti nama:", lama, "→", baru);

  try {
    const { data:cari } = await db.from("dialogs").select("script_name").eq("script_name", baru).limit(1);
    if(cari.length > 0) { 
      alert("❌ Nama sudah ada!"); 
      newScriptName.value = lama; 
      return; 
    }
    
    const { error:err1 } = await db.from("dialogs").update({script_name:baru}).eq("script_name", lama);
    const { error:err2 } = await db.from("actors").update({script_name:baru}).eq("script_name", lama);
    
    if(err1 || err2) throw err1 || err2;

    currentScript = baru; 
    localStorage.setItem("currentScript", currentScript);
    
    alert("✅ Nama berhasil diubah!"); 
    await renderScriptSelector(); 
    
  } catch (err) {
    console.error("❌ GAGAL GANTI:", err);
    alert("Kesalahan: " + err.message);
    newScriptName.value = lama; 
  }
});

// ✅ SIMPAN GENRE KE TABEL dialogs (TANPA TABEL TAMBAHAN)
saveGenreBtn.addEventListener("click", async () => {
  const genreBaru = genreInput.value.trim();
  currentGenre = genreBaru;
  localStorage.setItem("currentGenre", currentGenre);
  updateGenreDisplay();

  try {
    // ✅ HANYA UPDATE TABEL dialogs (yang sudah ada kolom genre)
    const { error:err } = await db.from("dialogs").update({ genre: currentGenre }).eq("script_name", currentScript);

    if (err) throw err;
    alert("✅ Genre berhasil ditambahkan & tersimpan!");
  } catch (err) {
    console.error("❌ Gagal simpan genre:", err);
    alert("❌ Gagal menyimpan genre: " + err.message);
  }
});

// ✅ BUAT SCRIPT BARU
createScriptBtn.addEventListener("click", async ()=>{
  const n = newScriptName.value.trim(); 
  const g = ""; // Genre baru kosong dulu
  if(!n) return alert("❌ Isi nama dulu!");
  
  try {
    const { data:cari } = await db.from("dialogs").select("script_name").eq("script_name", n).limit(1);
    if(cari.length > 0) { 
      alert("❌ Nama sudah ada!"); 
      return; 
    }

    await simpanAwal(n, g);

    currentScript = n; 
    currentGenre = g;
    genreInput.value = "";
    updateGenreDisplay();
    localStorage.setItem("currentScript,", currentScript);
    localStorage.setItem("currentGenre", currentGenre);
    allScenes = {}; 
    actors = []; 
    
    alert("✅ Script Baru Dibuat!");
    await renderScriptSelector(); 
    renderActors(); 
    loadScene();
    
  } catch (err) {
    console.error("❌ Gagal buat baru:", err);
  }
});

// Hapus Script
deleteScriptBtn.addEventListener("click", async ()=>{
  if(scriptSelector.options.length <= 1) return alert("❌ Minimal 1 script!");
  if(!confirm("Hapus: "+currentScript+" ?")) return;
  
  await db.from("dialogs").delete().eq("script_name", currentScript);
  await db.from("actors").delete().eq("script_name", currentScript);
  
  currentScript = "Script Baru"; 
  currentGenre = "";
  genreInput.value = "";
  updateGenreDisplay();
  localStorage.setItem("currentScript", currentScript);
  localStorage.setItem("currentGenre", currentGenre);
  await renderScriptSelector(); 
  loadFromSupabase(); 
  loadActorsFromSupabase();
  alert("✅ Dihapus");
});

// Pindah Script
scriptSelector.addEventListener("change", ()=>{ 
  currentScript = scriptSelector.value; 
  localStorage.setItem("currentScript", currentScript);
  newScriptName.value = currentScript; 
  loadFromSupabase(); 
  loadActorsFromSupabase(); 
});

// Pindah Scene
sceneSelect.addEventListener("change", ()=>{ currentScene = sceneSelect.value; loadScene(); });

// Ambil Data Scene Saat Ini
function getScene(){
  if(!allScenes[currentScene]) allScenes[currentScene]={place:"",situation:"",weather:"☀️ Cerah",dialogs:[]};
  return allScenes[currentScene];
}

// Ambil Nilai Avatar & Cuaca
function getAvatar(){ return document.querySelector('input[name="avatar"]:checked').value; }
function avatarSrc(a){ return a==="female"?"./ico/female.png":"./ico/male.png"; }
function getWeather(){ return document.querySelector('input[name="weather"]:checked').value; }

// ✅ SIMPAN SCENE
saveSceneBtn.addEventListener("click", async ()=>{
  const s=getScene(); 
  s.place=placeInput.value; 
  s.situation=situationInput.value; 
  s.weather=getWeather(); 
  
  await saveAll(); 
  renderScript();
  alert("✅ Scene Disimpan ke Database");
});

// Hapus Scene
deleteSceneBtn.addEventListener("click", ()=>{ 
  if(confirm("Hapus isi scene ini?")){ 
    delete allScenes[currentScene]; 
    saveAll(); 
    renderScript(); 
  } 
});

// Tambah/Ubah Dialog
addBtn.addEventListener("click", ()=>{
  const n=nameInput.value.trim(),t=dialogInput.value.trim(),s=sideInput.value,a=getAvatar();
  if(!n||!t)return alert("❌ Tidak boleh kosong!");
  
  const d=getScene().dialogs;
  if(editIndex!==null){ 
    d[editIndex]={name:n,text:t,side:s,avatar:a}; 
    editIndex=null; 
    addBtn.textContent="Simpan Perubahan"; 
  } else { 
    d.push({name:n,text:t,side:s,avatar:a}); 
  }
  nameInput.value=""; dialogInput.value=""; 
  saveAll(); 
  renderScript();
});

// Hapus Semua Dialog
clearBtn.addEventListener("click", ()=>{ 
  if(confirm("Hapus SEMUA dialog?")){ 
    getScene().dialogs=[]; 
    saveAll(); 
    renderScript(); 
  } 
});

// Tampilkan Script ke Layar
function renderScript(){
  const s=getScene(); chatArea.innerHTML="";
  const h=document.createElement("div"); h.className="scene-header";
  h.innerHTML=`
  <div class="scene-title">SCENE ${currentScene}</div>
  <div class="scene-place">📍 ${s.place||"Tanpa Tempat"}</div>
  <div class="scene-situation">🎭 ${s.situation||"Tanpa Situasi"}</div>
  <div class="scene-weather">${s.weather||"☀️ Cerah"}</div>`;
  chatArea.appendChild(h);

  s.dialogs.forEach((item,i)=>{
    const r=document.createElement("div"); r.className="dialog-row "+item.side;
    r.innerHTML=`
    <div class="character">
      <img class="character-icon" src="${avatarSrc(item.avatar)}"> ${item.name}
    </div>
    <div class="bubble">${item.text}</div>
    <div class="dialog-actions">
      <button onclick="editDialog(${i})">✏️</button>
      <button onclick="hapusDialog(${i})">🗑️</button>
    </div>`;
    chatArea.appendChild(r);
  });
}

window.editDialog=function(i){
  const d=getScene().dialogs[i];
  nameInput.value=d.name; dialogInput.value=d.text; sideInput.value=d.side;
  document.querySelector(`input[name="avatar"][value="${d.avatar}"]`).checked=true;
  editIndex=i; addBtn.textContent="✅ Simpan Perubahan";
};
window.hapusDialog=function(i){ 
  if(confirm("Hapus dialog ini?")){ 
    getScene().dialogs.splice(i,1); 
    saveAll(); 
    renderScript(); 
  } 
};

// ✅ FUNGSI UTAMA SIMPAN KE DATABASE
async function saveAll(){
  const namaScript = currentScript || "Script Baru";
  const genreSkrg = currentGenre || "";
  const rows = [];

  Object.keys(allScenes).forEach(nomorScene=>{
    const dataScene = allScenes[nomorScene];
    if(dataScene.dialogs.length === 0) {
      rows.push({
        script_name: namaScript,
        genre: genreSkrg,
        scene: nomorScene,
        place: dataScene.place || "",
        situation: dataScene.situation || "",
        weather: dataScene.weather || "☀️ Cerah",
        character: "",
        message: "",
        position: "left",
        avatar: "male"
      });
    } else {
      dataScene.dialogs.forEach(dialog=>{
        rows.push({
          script_name: namaScript,
          genre: genreSkrg,
          scene: nomorScene,
          place: dataScene.place || "",
          situation: dataScene.situation || "",
          weather: dataScene.weather || "☀️ Cerah",
          character: dialog.name,
          message: dialog.text,
          position: dialog.side,
          avatar: dialog.avatar
        });
      });
    }
  });

  try {
    console.log("💾 Menyimpan:", rows);
    const { error:errHapus } = await db.from("dialogs").delete().eq("script_name", namaScript);
    if(errHapus) throw errHapus;

    if(rows.length > 0){
      const { error:errSimpan } = await db.from("dialogs").insert(rows);
      if(errSimpan) throw errSimpan;
    }
    
    console.log("✅ BERHASIL DISIMPAN!");
    await renderScriptSelector();

  } catch (err) {
    console.error("❌ GAGAL SIMPAN:", err);
    alert("Error: " + err.message);
  }
}

// AMBIL DATA DARI DATABASE
async function loadFromSupabase(){
  const namaScript = currentScript || "Script Baru";
  const {data, error} = await db.from("dialogs").select("*").eq("script_name", namaScript).order("id");
  
  if(error) { console.error("❌ Gagal Ambil:", error); return; }
  
  allScenes={};
  if(data && data.length > 0) {
    // Ambil genre
    currentGenre = data[0].genre || "";
    genreInput.value = currentGenre;
    updateGenreDisplay();
    localStorage.setItem("currentGenre", currentGenre);
  }
  
  data?.forEach(r=>{
    if(!allScenes[r.scene]) allScenes[r.scene]={place:"",situation:"",weather:"☀️ Cerah",dialogs:[]};
    allScenes[r.scene].place = r.place; 
    allScenes[r.scene].situation = r.situation; 
    allScenes[r.scene].weather = r.weather;
    if(r.character && r.message) {
      allScenes[r.scene].dialogs.push({name:r.character, text:r.message, side:r.position, avatar:r.avatar});
    }
  });
  loadScene();
}

function loadScene(){
  const s=getScene();
  placeInput.value = s.place || ""; 
  situationInput.value = s.situation || "";
  const w=s.weather||"☀️ Cerah"; 
  const i=document.querySelector(`input[name="weather"][value="${w}"]`); 
  if(i)i.checked=true;
  renderScript();
}

// ==================== BAGIAN PEMAIN ====================
addActorBtn.addEventListener("click", ()=>{
  const n=actorNameInput.value.trim(),r=actorRoleInput.value.trim(),t=actorTraitInput.value.trim();
  if(!n)return alert("❌ Nama wajib!");
  actors.push({name:n,role:r,trait:t,script_name:currentScript});
  actorNameInput.value=""; actorRoleInput.value=""; actorTraitInput.value="";
  saveActors(); renderActors();
});

copyActorBtn.addEventListener("click", ()=>{
  let teks=""; actors.forEach(a=>teks+=`Nama: ${a.name}\nPeran: ${a.role}\n\n`);
  navigator.clipboard.writeText(teks).then(()=>alert("✅ Disalin!"));
});

function renderActors(){
  actorTableBody.innerHTML="";
  actors.forEach((a,i)=>{
    const d=document.createElement("div"); d.className="actor-item";
    d.innerHTML=`
    <div class="actor-main">
      <div class="actor-name">${a.name}</div>
      <div class="actor-buttons">
        <button onclick="this.parentElement.parentElement.parentElement.classList.toggle('open')">ℹ️</button>
        <button onclick="editActor(${i})">✏️</button>
        <button onclick="hapusActor(${i})">🗑️</button>
      </div>
    </div>
    <div class="actor-role">Peran: ${a.role||"-"}</div>
    <div class="actor-trait">Watak: ${a.trait||"-"}</div>`;
    actorTableBody.appendChild(d);
  });
}
window.editActor=function(i){ const a=actors[i]; actorNameInput.value=a.name; actorRoleInput.value=a.role; actors.splice(i,1); saveActors(); renderActors(); };
window.hapusActor=function(i){ actors.splice(i,1); saveActors(); renderActors(); };

async function saveActors(){ 
  try {
    await db.from("actors").delete().eq("script_name", currentScript); 
    if(actors.length) await db.from("actors").insert(actors); 
  } catch (err) { console.error("❌ Gagal Simpan Pemain:", err); }
}
async function loadActorsFromSupabase(){ 
  const {data} = await db.from("actors").select("*").eq("script_name", currentScript); 
  actors=data||[]; renderActors(); 
}

// ==================== VIEWER ====================
viewScriptBtn.addEventListener("click", ()=>{
  document.querySelector(".container").style.display="none";
  scriptViewer.style.display="block";
  
  let html=`<div class="viewer-paper"><div class="viewer-top"><button class="viewer-back" onclick="kembaliKeEdit()">Kembali</button><button class="viewer-print" onclick="window.print()">🖨️ Print</button></div>
  <div class="viewer-title">🎬 ${currentScript}</div>
  <!-- ✅ GENRE DITAMPILKAN DI SINI -->
  <div class="viewer-genre">📂 Genre: ${currentGenre || "-"}</div>`;
  
  for(let i=1;i<=40;i++){
    const s=allScenes[i]; 
    if(!s)continue; 
    const d=s.dialogs||[]; 
    if(!s.place&&!s.situation&&d.length===0)continue;
    
    html+=`<div class="viewer-scene"><div class="viewer-scene-title">SCENE ${i}</div><div class="viewer-info"><div><b>📍 Tempat:</b> ${s.place||"-"}</div><div><b>🎭 Situasi:</b> ${s.situation||"-"}</div><div><b>🌤️ Cuaca:</b> ${s.weather||"☀️ Cerah"}</div></div>`;
    
    d.forEach(item=>{
      const c=["red","blue","green","purple","yellow","cyan","orange"]; 
      let h=0; 
      for(let x=0;x<item.name.length;x++)h+=item.name.charCodeAt(x); 
      const w=c[h%c.length];
      
      const ak=actors.find(a=>a.name.toLowerCase()===item.name.toLowerCase());
      
      html+=`<div class="viewer-dialog" data-color="${w}"><div class="viewer-character">${item.name}</div><div class="viewer-role">${ak?.role||""}</div><div class="viewer-message">${item.text}</div></div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  scriptViewer.innerHTML=html;
});

window.kembaliKeEdit=function(){ 
  scriptViewer.style.display="none"; 
  document.querySelector(".container").style.display="grid"; 
};

copyBtn.addEventListener("click", ()=>{
  let teks=`NASKAH: ${currentScript}\nGENRE: ${currentGenre || "-"}\n\n`;
  Object.keys(allScenes).sort((a,b)=>a-b).forEach(n=>{
    const s=allScenes[n]; 
    teks+=`=== SCENE ${n} ===\nTempat: ${s.place}\nSituasi: ${s.situation}\nCuaca: ${s.weather}\n`;
    s.dialogs.forEach(d=>teks+=`${d.name}: ${d.text}\n`); 
    teks+="\n";
  });
  navigator.clipboard.writeText(teks).then(()=>alert("✅ Disalin!"));
});
</script>
